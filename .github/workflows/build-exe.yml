name: Build EXE

on:
  push:
    tags:
      - 'baseline-writing-buddy-*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '24'
  FORCE_COLOR: 0

jobs:
  build-exe:
    name: Build Writing Buddy EXE
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile all
        run: npm run compile

      - name: Build Electron
        run: npm run electron

      - name: Verify EXE exists
        run: |
          $exe = Get-ChildItem -Path '.build/electron' -Filter 'Writing Buddy.exe' -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error 'Writing Buddy.exe not found'
            exit 1
          }
          Write-Host "EXE: $($exe.FullName)"
          Write-Host "Size: $($exe.Length) bytes"
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
          Write-Host "SHA256: $hash"
          "EXE_SHA256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh
        id: verify

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: writing-buddy-exe
          path: .build/electron/
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.release == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: .build/electron/
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Visual Verification (optional) ──────────────────────────────────
  visual-check:
    name: Visual Verification
    runs-on: windows-latest
    timeout-minutes: 30
    needs: build-exe
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: writing-buddy-exe
          path: .build/electron

      - name: Launch EXE with debug port
        run: |
          $acceptanceRoot = Join-Path $env:TEMP 'wb-acceptance'
          $userData = Join-Path $acceptanceRoot 'user-data'
          $extDir = Join-Path $acceptanceRoot 'extensions'
          New-Item -ItemType Directory -Force -Path $userData, $extDir | Out-Null

          # Copy extension
          Copy-Item -Path 'extensions/writing-buddy' -Destination (Join-Path $extDir 'writing-buddy') -Recurse -Force

          # Pre-create sample novel
          $globalStorage = Join-Path $userData 'globalStorage/writing-buddy.writing-buddy'
          Copy-Item -Path 'extensions/writing-buddy/sample-novel' -Destination (Join-Path $globalStorage 'sample-novel') -Recurse -Force

          # Launch
          $env:VSCODE_DEV = '1'
          $proc = Start-Process -FilePath '.build/electron/Writing Buddy.exe' -ArgumentList @(
            '--user-data-dir', $userData,
            '--extensions-dir', $extDir,
            '--remote-debugging-port=9223'
          ) -PassThru -WindowStyle Minimized

          Start-Sleep -Seconds 30

          # Check CDP
          try {
            $r = Invoke-RestMethod 'http://127.0.0.1:9223/json/version' -TimeoutSec 5
            Write-Host "CDP OK: $($r.Browser)"
          } catch {
            Write-Host "CDP not available, checking process..."
            if ($proc.HasExited) {
              Write-Error "EXE exited with code $($proc.ExitCode)"
              exit 1
            }
            Write-Host "EXE is running (PID: $($proc.Id))"
          }

          # Cleanup
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue
        shell: pwsh
